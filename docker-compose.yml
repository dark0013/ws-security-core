version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_ws_security
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ws_security_db
      MYSQL_USER: ws_user
      MYSQL_PASSWORD: ws_password
    ports:
      - "3315:3315"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - ws_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local

networks:
  ws_network:
    driver: bridge

